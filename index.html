<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Deltarune</title>
</head>
<body>

    <div class="menu-wrapper">
        <div class="logo-container">
            <img src="./logo.png" alt="Deltarune" class="logo">
        </div>

        <div class="menu" id="menu"></div>
    </div>

    <audio id="drone" loop autoplay>
        <source src="./drone.ogg" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>

<script>
const CHAPTERS = [
    { number: 1, title: "The Beginning", available: true },
    { number: 2, title: "A Cyber's World", available: true },
    { number: 3, title: "Late Night", available: true },
    { number: 4, title: "Prophecy", available: true },
    { number: 5, title: "--", available: false },
    { number: 6, title: "--", available: false },
    { number: 7, title: "--", available: false }
];

let selectedChapter = null;

const audio = document.getElementById('drone');
const menuMoveAudio = new Audio('./move.mp3');
const menuSelectAudio = new Audio('./select.mp3');

function initMenu() {
    const menu = document.getElementById('menu');
    CHAPTERS.forEach((chapter, index) => {
        const row = document.createElement('a');
        row.className = chapter.available ? 'row' : 'disabled-row';
        row.href = chapter.available ? `javascript:loadChapter(${chapter.number}, '${chapter.title}')` : `javascript:void(0)`;
        
        row.innerHTML = `
            <span class="chapter-num">Ch. ${chapter.number}</span>
            <span class="chapter-title">${chapter.title}</span>
            <div class="chapter-status-img">
                <img src="./${chapter.available ? chapter.number : 0}.png" alt="">
            </div>
        `;
        menu.appendChild(row);
    });
}

function restartAudio() {
    audio.currentTime = 0;
    audio.play().catch(() => {
        const resume = () => {
            audio.play();
            window.removeEventListener('click', resume);
        };
        window.addEventListener('click', resume, { once: true });
    });
}

function loadChapter(number, title) {
    menuSelectAudio.play().catch(() => {});
    alert(`CHAPTER ${number}: "${title}" selected.`);
}

function selectChapter(index) {
    const rows = document.querySelectorAll('.row, .disabled-row');
    if (selectedChapter !== null && rows[selectedChapter]) {
        rows[selectedChapter].classList.remove("selected");
    }
    selectedChapter = index;
    if(rows[selectedChapter]) {
        rows[selectedChapter].classList.add("selected");
        menuMoveAudio.play().catch(() => {});
    }
}

document.addEventListener('keydown', (event) => {
    const rows = document.querySelectorAll('.row, .disabled-row');
    if (rows.length === 0) return;

    if (event.key === 'ArrowUp') {
        const newIndex = selectedChapter === null || selectedChapter === 0 ? rows.length - 1 : selectedChapter - 1;
        selectChapter(newIndex);
    } else if (event.key === 'ArrowDown') {
        const newIndex = selectedChapter === null || selectedChapter === rows.length - 1 ? 0 : selectedChapter + 1;
        selectChapter(newIndex);
    } else if (event.key === 'Enter' && selectedChapter !== null) {
        rows[selectedChapter].click();
    }
});

function setupMouseEvents() {
    document.querySelectorAll('.row, .disabled-row').forEach((row, index) => {
        row.addEventListener('mouseenter', () => selectChapter(index));
    });
}

initMenu();
setupMouseEvents();
restartAudio();
</script>
</body>
</html>
