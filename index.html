
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- Links pointing directly to your live repository assets -->
    <link rel="stylesheet" href="https://github.io">
    <title>Deltarune</title>
</head>
<body>

    <div class="logo-container">
        <img src="https://github.io" alt="Logo" class="logo">
    </div>

    <div class="menu" id="menu"></div>

    <audio id="drone" loop autoplay>
        <source src="https://github.io" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>

<script>
const CHAPTERS = [
    { number: 1, title: "The Beginning", available: true },
    { number: 2, title: "A Cyber's World", available: true },
    { number: 3, title: "Late Night", available: true },
    { number: 4, title: "Prophecy", available: true },
    { number: 5, title: "--", available: false },
    { number: 6, title: "--", available: false },
    { number: 7, title: "--", available: false }
];

let gameStarted = false;
let selectedChapter = null;

const audio = document.getElementById('drone');
const menuMoveAudio = new Audio('https://github.io');
const menuSelectAudio = new Audio('https://github.io');

function initMenu() {
    const menu = document.getElementById('menu');
    CHAPTERS.forEach((chapter, index) => {
        const row = document.createElement('a');
        row.className = chapter.available ? 'row' : 'disabled-row';
        row.href = chapter.available ? `javascript:loadChapter(${chapter.number})` : `javascript:alert('Chapter ${chapter.number} coming soon!')`;
        
        // FIX: Replaced quotes with backticks and integrated proper ${} syntax
        row.innerHTML = `
            <span class="chapter">Chapter ${chapter.number}</span>
            <span class="${chapter.available ? 'title' : 'disabled-title'}">${chapter.title}</span>
            <img src="https://github.io{chapter.available ? chapter.number : 0}.png">
        `;
        menu.appendChild(row);
    });
}

function restartAudio() {
    audio.currentTime = 0;
    audio.play().catch(err => {
        console.log('Audio play failed:', err);
        const resume = () => {
            audio.play().catch(e => console.log('Audio resume failed:', e));
            window.removeEventListener('click', resume);
            window.removeEventListener('keydown', resume);
        };
        window.addEventListener('click', resume, { once: true });
        window.addEventListener('keydown', resume, { once: true });
    });
}

function loadChapter(chapter) {
    audio.muted = true;
    // FIX: Using template literals to inject the dynamic chapter folder route properly
    window.location.href = `https://github.io{chapter}/index.html`;
}

function selectChapter(index) {
    const rows = document.querySelectorAll('.row');
    if (selectedChapter !== null && rows[selectedChapter]) {
        rows[selectedChapter].classList.remove("selected");
    }
    selectedChapter = index;
    if(rows[selectedChapter]) {
        rows[selectedChapter].classList.add("selected");
        menuMoveAudio.play().catch(e => {});
    }
}

function navigateUp() {
    const rows = document.querySelectorAll('.row');
    if (rows.length === 0) return;
    if (selectedChapter === null) {
        selectChapter(0);
    } else {
        const newIndex = selectedChapter === 0 ? rows.length - 1 : selectedChapter - 1;
        selectChapter(newIndex);
    }
}

function navigateDown() {
    const rows = document.querySelectorAll('.row');
    if (rows.length === 0) return;
    if (selectedChapter === null) {
        selectChapter(0);
    } else {
        const newIndex = selectedChapter === rows.length - 1 ? 0 : selectedChapter + 1;
        selectChapter(newIndex);
    }
}

function activateSelected() {
    if (selectedChapter !== null) {
        const rows = document.querySelectorAll('.row');
        if(rows[selectedChapter]) {
            menuSelectAudio.play().catch(e => {});
            window.location.href = rows[selectedChapter].href;
        }
    }
}

document.addEventListener('keydown', (event) => {
    if (gameStarted) return;
    switch(event.key) {
        case 'ArrowUp': navigateUp(); break;
        case 'ArrowDown': navigateDown(); break;
        case 'Enter': activateSelected(); break;
    }
});

function setupMouseEvents() {
    document.querySelectorAll('.row').forEach((row, index) => {
        row.addEventListener('mouseenter', () => {
            if (!gameStarted) {
                if (selectedChapter !== null) {
                    const oldRow = document.querySelectorAll('.row')[selectedChapter];
                    if(oldRow) oldRow.classList.remove("selected");
                }
                selectChapter(index);
            }
        });
        row.addEventListener('click', () => {
            if (!gameStarted) {
                menuSelectAudio.play().catch(e => {});
            }
        });
    });
}

document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !gameStarted) {
        restartAudio();
    }
});

window.addEventListener('pageshow', (event) => {
    if (event.persisted || performance.navigation.type === 2) {
        gameStarted = false;
        audio.muted = false;
        restartAudio();
    }
});

// Initialization
initMenu();
setupMouseEvents();
restartAudio();
</script>
</body>
</html>
